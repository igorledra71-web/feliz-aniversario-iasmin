<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Meu Amor ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(-45deg,#ff4e8b,#ff758c,#ff7eb3,#ffb199);
background-size:400% 400%;
animation:gradient 10s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:800px;
z-index:10;
position:relative;
}

h1{
font-family:'Dancing Script',cursive;
font-size:55px;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:1.8;
min-height:150px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff4e8b;
font-weight:bold;
cursor:pointer;
transition:0.4s;
font-size:16px;
}

button:hover{
transform:scale(1.1);
}

.fade{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:2s;
z-index:5;
}

/* ESTRELAS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:0.3;}
to{opacity:1;}
}

/* NOME FINAL */
.name-final{
margin-top:40px;
font-family:'Dancing Script',cursive;
font-size:80px;
opacity:0;
animation:pulse 3s infinite alternate;
text-shadow:0 0 10px white,0 0 30px white,0 0 60px white;
}

@keyframes pulse{
from{transform:scale(1); opacity:0.8;}
to{transform:scale(1.05); opacity:1;}
}

</style>
</head>
<body>

<div class="container" id="startScreen">
<h1>Feliz Aniversário 💖</h1>
<div class="message" id="initialText"></div>
<button id="enterBtn">🌙 Entrar no Nosso Universo ✨</button>
</div>

<div class="fade" id="fade"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

// MENSAGEM INICIAL
const initialMessage = `
Hoje é um dia especial...

Mas o que eu sinto por você, amor,
é maior que qualquer data.

Eu preparei algo diferente pra você...
`;

let i = 0;
function typeInitial(){
if(i < initialMessage.length){
document.getElementById("initialText").innerHTML += initialMessage.charAt(i);
i++;
setTimeout(typeInitial,60);
}
}
typeInitial();

// BOTÃO
document.getElementById("enterBtn").addEventListener("click", function(){

let fade = document.getElementById("fade");
fade.style.opacity = 1;

setTimeout(()=>{

document.getElementById("startScreen").remove();
document.body.style.background = "black";
fade.style.opacity = 0;

// criar estrelas com movimento suave
for(let i=0;i<250;i++){
let star = document.createElement("div");
star.classList.add("star");

star.style.top = Math.random()*100+"vh";
star.style.left = Math.random()*100+"vw";

let moveX = (Math.random()-0.5)*0.15;
let moveY = (Math.random()-0.5)*0.15;

setInterval(()=>{
let top = parseFloat(star.style.top);
let left = parseFloat(star.style.left);
star.style.top = (top + moveY) + "vh";
star.style.left = (left + moveX) + "vw";
},60);

document.body.appendChild(star);
}

document.getElementById("music").play();

showUniverseMessage();

},2000);

});

// MENSAGEM UNIVERSO (MAIS LENTA)
function showUniverseMessage(){

let universeText = `
Amor...

Se o céu tivesse um nome,
seria o seu, amor.

Se as estrelas soubessem amar,
elas aprenderiam com você, amor.

Você é meu abrigo,
meu sorriso,
minha paz,
meu futuro inteiro, amor.

Hoje o universo brilha diferente,
porque ele sabe
que é o aniversário
do amor da minha vida.

Eu te amo infinitamente, amor ❤️
`;

let container = document.createElement("div");
container.style.position="absolute";
container.style.top="45%";
container.style.left="50%";
container.style.transform="translate(-50%,-50%)";
container.style.width="90%";
container.style.maxWidth="800px";
container.style.fontSize="22px";
container.style.lineHeight="1.8";
container.style.zIndex="15";
document.body.appendChild(container);

let j = 0;
function typeUniverse(){
if(j < universeText.length){
container.innerHTML += universeText.charAt(j);
j++;
setTimeout(typeUniverse,100); // MAIS LENTO
}else{
showName(container);
}
}
typeUniverse();
}

function showName(container){

let name = document.createElement("div");
name.classList.add("name-final");
name.innerHTML = "IASMIN";
container.appendChild(name);

setTimeout(()=>{
name.style.opacity = 1;
},500);

}

</script>

</body>
</html>
