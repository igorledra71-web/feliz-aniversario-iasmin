<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Iasmin ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#ff4e8b,#ff758c,#ff7eb3,#ffb199);
background-size:400% 400%;
animation:gradient 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
transition:2s;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:800px;
z-index:2;
}

h1{
font-family:'Dancing Script',cursive;
font-size:60px;
margin-bottom:20px;
animation:fadeIn 2s ease forwards;
}

.message{
font-size:20px;
line-height:1.8;
min-height:180px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff4e8b;
font-weight:bold;
cursor:pointer;
transition:0.4s;
font-size:16px;
}

button:hover{
transform:scale(1.1);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

/* ESTRELAS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:0.2;}
to{opacity:1;}
}

/* CONSTELAÇÃO */
.constellation{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Dancing Script',cursive;
font-size:80px;
color:white;
opacity:0;
transition:3s;
text-shadow:0 0 10px white,0 0 20px white,0 0 40px #fff;
}

</style>
</head>
<body>

<div class="container">
<h1>Feliz Aniversário, Minha Princesa 💖</h1>
<div class="message" id="text"></div>
<button onclick="enterUniverse()">🌙 Entrar no Nosso Universo ✨</button>
</div>

<div class="constellation" id="name">IASMIN</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const message = `
Hoje é o dia da pessoa mais especial da minha vida...

Iasmin, você ilumina meus dias
como estrelas iluminam o céu.

Mas agora...
eu quero te mostrar algo diferente.

Clique abaixo
e entre no nosso universo ❤️
`;

let i = 0;
const speed = 50;
const textDiv = document.getElementById("text");

function typeWriter(){
if(i < message.length){
textDiv.innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}
typeWriter();

function enterUniverse(){

// mudar fundo
document.body.style.background = "black";

// criar estrelas
for(let i=0;i<200;i++){
let star = document.createElement("div");
star.classList.add("star");
star.style.top = Math.random()*100+"vh";
star.style.left = Math.random()*100+"vw";
star.style.animationDuration = (Math.random()*3+1)+"s";
document.body.appendChild(star);
}

// mostrar nome tipo constelação
setTimeout(()=>{
document.getElementById("name").style.opacity = 1;
},1500);

// tocar música
document.getElementById("music").play();

}
</script>

</body>
</html>
