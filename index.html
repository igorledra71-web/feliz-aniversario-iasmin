<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Meu Amor ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(-45deg,#ff4e8b,#ff758c,#ff7eb3,#ffb199);
background-size:400% 400%;
animation:gradient 10s ease infinite;
transition:2s;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:800px;
z-index:2;
}

h1{
font-family:'Dancing Script',cursive;
font-size:55px;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:1.8;
min-height:160px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff4e8b;
font-weight:bold;
cursor:pointer;
transition:0.4s;
font-size:16px;
}

button:hover{
transform:scale(1.1);
}

/* UNIVERSO */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:0.3;}
to{opacity:1;}
}

.fade-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
transition:4s;
z-index:5;
}

.constellation{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Dancing Script',cursive;
font-size:90px;
opacity:0;
text-shadow:0 0 10px white,0 0 30px white,0 0 60px white;
transition:4s;
}
</style>
</head>
<body>

<div class="container" id="startScreen">
<h1>Feliz Aniversário 💖</h1>
<div class="message" id="initialText"></div>
<button onclick="enterUniverse()">🌙 Entrar no Nosso Universo ✨</button>
</div>

<div class="fade-overlay" id="fade"></div>
<div class="constellation" id="name">IASMIN</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

/* MENSAGEM INICIAL */

const initialMessage = `
Hoje é um dia especial...

Mas o que eu sinto por você, amor,
é maior que qualquer data.

Eu preparei algo diferente pra você...
`;

let i = 0;
function typeInitial(){
if(i < initialMessage.length){
document.getElementById("initialText").innerHTML += initialMessage.charAt(i);
i++;
setTimeout(typeInitial,40);
}
}
typeInitial();

/* ENTRAR NO UNIVERSO */

function enterUniverse(){

// tocar música
document.getElementById("music").play();

// escurecer tela
document.getElementById("fade").style.opacity = 1;

// remover tela inicial
setTimeout(()=>{
document.getElementById("startScreen").style.display="none";
document.body.style.background="black";
},2000);

// clarear devagar
setTimeout(()=>{
document.getElementById("fade").style.opacity = 0;
},2500);

// criar estrelas
setTimeout(()=>{
for(let i=0;i<250;i++){
let star = document.createElement("div");
star.classList.add("star");
star.style.top = Math.random()*100+"vh";
star.style.left = Math.random()*100+"vw";
star.style.animationDuration = (Math.random()*3+1)+"s";
document.body.appendChild(star);
}
},3000);

// nova mensagem
setTimeout(()=>{
showUniverseMessage();
},3500);

}

/* MENSAGEM UNIVERSO */

function showUniverseMessage(){

let universeText = `
Amor...

Se o céu tivesse um nome,
seria o seu.

Se as estrelas soubessem amar,
elas aprenderiam com você.

Você é meu abrigo,
meu sorriso,
minha paz,
meu futuro inteiro, amor.

Hoje o universo brilha diferente,
porque ele sabe
que é o aniversário
do amor da minha vida.

Eu te amo infinitamente ❤️
`;

let container = document.createElement("div");
container.style.position="absolute";
container.style.top="50%";
container.style.left="50%";
container.style.transform="translate(-50%,-50%)";
container.style.width="90%";
container.style.maxWidth="800px";
container.style.fontSize="22px";
container.style.lineHeight="1.8";
container.style.zIndex="10";
document.body.appendChild(container);

let j = 0;
function typeUniverse(){
if(j < universeText.length){
container.innerHTML += universeText.charAt(j);
j++;
setTimeout(typeUniverse,45);
}else{
setTimeout(()=>{
document.getElementById("name").style.opacity = 1;
},2000);
}
}
typeUniverse();

}

</script>

</body>
</html>
